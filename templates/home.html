<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moty Tools</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Heebo', sans-serif;
  background: #0a0a0f;
  color: #fff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.bg-animation {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(100px);
  opacity: 0.12;
  animation: float 20s ease-in-out infinite;
}
.orb:nth-child(1) { width: 600px; height: 600px; background: #667eea; top: -15%; right: -10%; }
.orb:nth-child(2) { width: 500px; height: 500px; background: #f093fb; bottom: -15%; left: -5%; animation-delay: -7s; }
.orb:nth-child(3) { width: 400px; height: 400px; background: #ff6b35; top: 50%; left: 40%; animation-delay: -14s; }

@keyframes float {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(50px, -30px) scale(1.1); }
  50% { transform: translate(-30px, 50px) scale(0.95); }
  75% { transform: translate(40px, 20px) scale(1.05); }
}

.container {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 40px 20px;
}

h1 {
  font-size: 52px;
  font-weight: 900;
  margin-bottom: 8px;
}
h1 .moty {
  background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #f093fb, #ff6b6b);
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: rainbow 4s ease infinite;
}
@keyframes rainbow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.subtitle {
  color: #666;
  font-size: 18px;
  font-weight: 300;
  margin-bottom: 50px;
}

.cards {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

.card {
  background: rgba(26, 26, 46, 0.7);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  padding: 30px 24px;
  width: 250px;
  text-decoration: none;
  color: #fff;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 24px;
  opacity: 0;
  transition: opacity 0.3s;
}
.card:hover {
  transform: translateY(-8px) scale(1.02);
  border-color: rgba(255,255,255,0.15);
}
.card:hover::before { opacity: 1; }

.card-dtf::before { background: linear-gradient(135deg, rgba(255,107,53,0.1), rgba(255,69,0,0.05)); }
.card-dtf:hover { box-shadow: 0 20px 60px rgba(255,107,53,0.2); }

.card-bg::before { background: linear-gradient(135deg, rgba(102,126,234,0.1), rgba(240,147,251,0.05)); }
.card-bg:hover { box-shadow: 0 20px 60px rgba(102,126,234,0.2); }

.card-text::before { background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,107,53,0.05)); }
.card-text:hover { box-shadow: 0 20px 60px rgba(255,215,0,0.2); }
.card-text .card-title {
  background: linear-gradient(135deg, #ffd700, #ff6b35);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.card-icon {
  font-size: 64px;
  margin-bottom: 20px;
  display: block;
}

.card-title {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 10px;
}

.card-dtf .card-title {
  background: linear-gradient(135deg, #ff6b35, #ff4500);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.card-bg .card-title {
  background: linear-gradient(135deg, #667eea, #f093fb);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.card-desc {
  color: #888;
  font-size: 14px;
  line-height: 1.6;
}

.footer {
  margin-top: 60px;
  color: #333;
  font-size: 12px;
}
</style>
</head>
<body>

<div class="bg-animation">
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
</div>

<div class="container">
  <h1><span class="moty">MOTY</span> Tools</h1>
  <p class="subtitle">כלים חכמים להדפסת DTF ועיצוב תמונות</p>

  <div class="cards">
    <a href="/dtf" class="card card-dtf">
      <span class="card-icon">🔥</span>
      <div class="card-title">DTF Converter</div>
      <div class="card-desc">הסרת רקע אוטומטית להדפסת DTF — עם תמיכה ב-Halftone</div>
    </a>

    <a href="/bgremover" class="card card-bg">
      <span class="card-icon">🖼️</span>
      <div class="card-title">Background Remover</div>
      <div class="card-desc">הסרת רקע חכמה עם AI — עובד לחלוטין בדפדפן</div>
    </a>

    <a href="/text" class="card card-text">
      <span class="card-icon">✍️</span>
      <div class="card-title">Text Designer</div>
      <div class="card-desc">עיצוב טקסט בעברית — גרפיטי, ניאון, זהב ועוד — מוכן להדפסה</div>
    </a>
  </div>

  <div class="footer">Moty Tools &bull; by Moty &bull; AI-Powered</div>
</div>

</body>
</html>
