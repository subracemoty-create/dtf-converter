<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOTY Text Designer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Rubik:wght@700;900&family=Secular+One&family=Karantina:wght@700&family=Rubik+Mono+One&family=Varela+Round&family=Suez+One&family=Frank+Ruhl+Libre:wght@700;900&family=Amatic+SC:wght@700&family=Bungee&family=Bungee+Shade&family=Permanent+Marker&family=Rubik+Glitch&family=Rubik+Wet+Paint&family=Rubik+Burned&family=Rubik+Dirt&family=Rubik+Distressed&family=Rubik+Spray+Paint&family=Rubik+Vinyl&family=Rubik+Puddles&family=Rubik+Storm&family=Rubik+Microbe&family=Rubik+Maze&family=Rubik+Iso&family=Rubik+Pixels&family=Rubik+Maps&family=Rubik+Broken+Fax&family=Rubik+Lines&family=Rubik+Doodle+Shadow&family=Rubik+Doodle+Triangles&family=Rubik+Gemstones&family=Rubik+Marker+Hatch&family=Rubik+Scribble&family=Bangers&family=Passion+One:wght@700;900&family=Black+Ops+One&family=Creepster&family=Nosifer&family=Metal+Mania&family=Pirata+One&family=Emblema+One&family=Fascinate&family=Hanalei+Fill&family=Monoton&family=Vast+Shadow&family=Ewert&family=Plaster&family=Faster+One&family=Bungee+Spice&family=Bungee+Outline&family=Silkscreen&family=Press+Start+2P&family=Pixelify+Sans:wght@700&family=Honk&family=Nabla&family=Foldit:wght@700&family=Tourney:wght@700;900&family=Alef:wght@700&family=Miriam+Libre:wght@700&family=Bellefair&family=David+Libre:wght@700&family=Assistant:wght@700&family=Dancing+Script:wght@700&family=Great+Vibes&family=Pacifico&family=Lobster&family=Satisfy&family=Sacramento&family=Caveat:wght@700&family=Kalam:wght@700&family=Patrick+Hand&family=Indie+Flower&family=Shadows+Into+Light&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Heebo', sans-serif;
  background: #0a0a0f;
  color: #fff;
  min-height: 100vh;
  direction: rtl;
}

.bg-animation {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(100px);
  opacity: 0.12;
  animation: float 20s ease-in-out infinite;
}
.orb:nth-child(1) { width: 600px; height: 600px; background: #ff6b35; top: -15%; right: -10%; }
.orb:nth-child(2) { width: 500px; height: 500px; background: #f093fb; bottom: -15%; left: -5%; animation-delay: -7s; }
.orb:nth-child(3) { width: 400px; height: 400px; background: #4d96ff; top: 50%; left: 40%; animation-delay: -14s; }

@keyframes float {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(50px, -30px) scale(1.1); }
  50% { transform: translate(-30px, 50px) scale(0.95); }
  75% { transform: translate(40px, 20px) scale(1.05); }
}

.app-container {
  position: relative;
  z-index: 1;
  max-width: 1200px;
  margin: 0 auto;
  padding: 15px 15px;
}

.header {
  text-align: center;
  margin-bottom: 12px;
}
.header h1 {
  font-size: 24px;
  font-weight: 900;
}
.header h1 .accent {
  background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: rainbow 4s ease infinite;
}
@keyframes rainbow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.header .sub { color: #666; font-size: 13px; margin-top: 3px; }

.back-link {
  position: absolute;
  top: 30px;
  right: 20px;
  color: #888;
  text-decoration: none;
  font-size: 14px;
  transition: color 0.3s;
}
.back-link:hover { color: #fff; }

.main-layout {
  display: grid;
  grid-template-columns: 240px 1fr 280px;
  gap: 10px;
  align-items: start;
}

@media (max-width: 900px) {
  .main-layout {
    grid-template-columns: 1fr 1fr;
  }
  .preview-area { grid-column: 1 / -1; grid-row: 1; }
}

/* Controls Panel */
.controls {
  background: rgba(26, 26, 46, 0.7);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 10px;
  max-height: calc(100vh - 70px);
  overflow-y: auto;
}
.controls::-webkit-scrollbar { width: 4px; }
.controls::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

.control-group {
  margin-bottom: 10px;
}
.control-group:last-child { margin-bottom: 0; }

.control-label {
  font-size: 11px;
  font-weight: 700;
  color: #aaa;
  margin-bottom: 5px;
  display: block;
}

.text-input {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  padding: 8px 10px;
  color: #fff;
  font-size: 15px;
  font-family: 'Heebo', sans-serif;
  text-align: right;
  direction: rtl;
  outline: none;
  transition: border-color 0.3s;
}
.text-input:focus {
  border-color: rgba(255,107,53,0.5);
}
.text-input::placeholder { color: #444; }

/* Font Grid */
.font-section-label {
  font-size: 10px;
  color: #555;
  margin: 6px 0 3px;
  text-align: center;
}
.font-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 4px;
  max-height: 260px;
  overflow-y: auto;
}
.font-grid::-webkit-scrollbar { width: 3px; }
.font-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
.font-btn {
  background: rgba(255,255,255,0.05);
  border: 2px solid rgba(255,255,255,0.08);
  border-radius: 6px;
  padding: 4px 2px;
  color: #ccc;
  cursor: pointer;
  transition: all 0.3s;
  font-size: 11px;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
}
.font-btn.en-only { border-color: rgba(100,150,255,0.15); }
.font-btn:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.2);
}
.font-btn.active {
  background: rgba(255,107,53,0.15);
  border-color: #ff6b35;
  color: #fff;
}

/* Style Grid */
.style-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}
.style-btn {
  background: rgba(255,255,255,0.05);
  border: 2px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 6px 4px;
  color: #ccc;
  cursor: pointer;
  transition: all 0.3s;
  font-size: 11px;
  font-weight: 700;
  text-align: center;
}
.style-btn:hover {
  background: rgba(255,255,255,0.1);
}
.style-btn.active {
  background: rgba(102,126,234,0.15);
  border-color: #667eea;
  color: #fff;
}

/* Color pickers */
.color-row {
  display: flex;
  gap: 12px;
  align-items: center;
}
.color-picker-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
}
.color-picker-wrap label {
  font-size: 12px;
  color: #888;
  white-space: nowrap;
}
.color-picker-wrap input[type="color"] {
  width: 40px;
  height: 32px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: transparent;
}

/* Slider - defined below after .sl */

/* Preset colors */
.color-presets {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 8px;
}
.color-preset {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.1);
  cursor: pointer;
  transition: all 0.3s;
}
.color-preset:hover {
  transform: scale(1.2);
  border-color: #fff;
}

/* Preview Area */
.preview-area {
  background: rgba(26, 26, 46, 0.7);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 14px;
  min-height: 300px;
  display: flex;
  flex-direction: column;
}

.preview-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.preview-title {
  font-size: 14px;
  color: #888;
}

.bg-toggle {
  display: flex;
  gap: 6px;
}
.bg-toggle button {
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  color: #888;
  cursor: pointer;
  font-size: 11px;
  font-family: 'Heebo', sans-serif;
  transition: all 0.3s;
}
.bg-toggle button.active {
  background: rgba(255,255,255,0.15);
  color: #fff;
  border-color: rgba(255,255,255,0.3);
}

.canvas-container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 250px;
  border-radius: 12px;
  position: relative;
  overflow: hidden;
}

.canvas-container.bg-checker {
  background-image:
    linear-gradient(45deg, #ccc 25%, transparent 25%),
    linear-gradient(-45deg, #ccc 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #ccc 75%),
    linear-gradient(-45deg, transparent 75%, #ccc 75%);
  background-size: 20px 20px;
  background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
  background-color: #fff;
}
.canvas-container.bg-black {
  background: #000;
}
.canvas-container.bg-white {
  background: #fff;
}

canvas {
  max-width: 100%;
  max-height: 500px;
}

/* Buttons */
.action-buttons {
  display: flex;
  gap: 10px;
  margin-top: 16px;
}
.btn {
  flex: 1;
  padding: 10px 14px;
  border: none;
  border-radius: 10px;
  font-family: 'Heebo', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
}
.btn-primary {
  background: linear-gradient(135deg, #ff6b35, #ff4500);
  color: #fff;
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(255,107,53,0.3);
}
.btn-secondary {
  background: rgba(255,255,255,0.08);
  color: #ccc;
  border: 1px solid rgba(255,255,255,0.1);
}
.btn-secondary:hover {
  background: rgba(255,255,255,0.12);
  color: #fff;
}

/* Line controls */
.line-controls {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-top: 8px;
}
.line-controls button {
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  color: #888;
  cursor: pointer;
  font-size: 12px;
  font-family: 'Heebo', sans-serif;
}
.line-controls button:hover {
  background: rgba(255,255,255,0.1);
  color: #fff;
}
.line-hint {
  font-size: 11px;
  color: #555;
  margin-top: 4px;
}
.sl {
  font-size: 11px;
  color: #888;
  min-width: 55px;
  white-space: nowrap;
}
.slider-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}
.slider-row input[type="range"] {
  flex: 1;
  accent-color: #ff6b35;
  min-width: 80px;
}
.slider-val {
  font-size: 12px;
  color: #aaa;
  min-width: 38px;
  text-align: left;
}
</style>
</head>
<body>

<div class="bg-animation">
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
</div>

<div class="app-container">
  <a href="/" class="back-link">← חזרה</a>

  <div class="header">
    <h1>✍️ <span class="accent">MOTY</span> Text Designer</h1>
    <p class="sub">כתוב בעברית — קבל עיצוב מוכן להדפסת DTF</p>
  </div>

  <div class="main-layout">
    <!-- LEFT PANEL: Text, Font, Style, Colors -->
    <div class="controls">
      <div class="control-group">
        <label class="control-label">✏️ טקסט</label>
        <textarea class="text-input" id="textInput" rows="2" placeholder="כתוב כאן...">שלום עולם</textarea>
      </div>

      <div class="control-group">
        <label class="control-label">🔤 פונט</label>
        <div class="font-grid" id="fontGrid"></div>
      </div>

      <div class="control-group">
        <label class="control-label">🎨 סגנון</label>
        <div class="style-grid" id="styleGrid"></div>
      </div>

      <div class="control-group">
        <label class="control-label">🎨 צבעים</label>
        <div class="color-row">
          <div class="color-picker-wrap">
            <label>ראשי</label>
            <input type="color" id="colorMain" value="#ffffff">
          </div>
          <div class="color-picker-wrap">
            <label>משני</label>
            <input type="color" id="colorSecondary" value="#ff6b35">
          </div>
        </div>
        <div class="color-presets" id="colorPresets"></div>
      </div>

      <div class="control-group">
        <label class="control-label">🌈 צבע מיוחד</label>
        <div class="style-grid" style="grid-template-columns:1fr 1fr">
          <button class="style-btn active" id="colorModeNormal" onclick="setColorMode('normal')">רגיל</button>
          <button class="style-btn" id="colorModeRainbow" onclick="setColorMode('rainbow')">קשת</button>
          <button class="style-btn" id="colorModeRandom" onclick="setColorMode('random')">אקראי</button>
          <button class="style-btn" id="colorModeWave" onclick="setColorMode('wave')">גל</button>
        </div>
      </div>
    </div>

    <!-- CENTER: Preview -->
    <div class="preview-area">
      <div class="preview-header">
        <span class="preview-title">תצוגה מקדימה</span>
        <div class="bg-toggle">
          <button class="active" data-bg="checker">שקוף</button>
          <button data-bg="black">שחור</button>
          <button data-bg="white">לבן</button>
        </div>
      </div>

      <div class="canvas-container bg-checker" id="canvasContainer">
        <canvas id="textCanvas"></canvas>
      </div>

      <div class="action-buttons">
        <button class="btn btn-primary" id="downloadBtn">⬇️ הורד PNG</button>
        <button class="btn btn-secondary" id="copyBtn">📋 העתק</button>
      </div>
    </div>

    <!-- RIGHT PANEL: Size, Tools, Effects, Curve -->
    <div class="controls">
      <div class="control-group">
        <label class="control-label">📐 גודל</label>
        <div class="slider-row">
          <input type="range" id="fontSize" min="40" max="300" value="120">
          <span class="slider-val" id="fontSizeVal">120</span>
        </div>
      </div>

      <div class="control-group">
        <label class="control-label">🔧 עיצוב</label>
        <div class="slider-row">
          <span class="sl">מרווח</span>
          <input type="range" id="letterSpacing" min="-20" max="60" value="0">
          <span class="slider-val" id="letterSpacingVal">0</span>
        </div>
        <div class="slider-row">
          <span class="sl">רוחב</span>
          <input type="range" id="scaleX" min="50" max="200" value="100">
          <span class="slider-val" id="scaleXVal">100%</span>
        </div>
        <div class="slider-row">
          <span class="sl">גובה</span>
          <input type="range" id="scaleY" min="50" max="200" value="100">
          <span class="slider-val" id="scaleYVal">100%</span>
        </div>
        <div class="slider-row">
          <span class="sl">הטיה</span>
          <input type="range" id="skewX" min="-45" max="45" value="0">
          <span class="slider-val" id="skewXVal">0°</span>
        </div>
        <div class="slider-row">
          <span class="sl">סיבוב</span>
          <input type="range" id="rotation" min="-180" max="180" value="0">
          <span class="slider-val" id="rotationVal">0°</span>
        </div>
        <div class="slider-row">
          <span class="sl">שורות</span>
          <input type="range" id="lineSpacing" min="60" max="250" value="120">
          <span class="slider-val" id="lineSpacingVal">120%</span>
        </div>
      </div>

      <div class="control-group">
        <label class="control-label">✨ אפקטים</label>
        <div class="slider-row">
          <span class="sl">מתאר</span>
          <input type="range" id="outlineWidth" min="0" max="20" value="0">
          <span class="slider-val" id="outlineWidthVal">0</span>
        </div>
        <div class="slider-row">
          <span class="sl">צבע</span>
          <input type="color" id="outlineColor" value="#000000" style="width:28px;height:22px;border:none;border-radius:4px;cursor:pointer;background:transparent;">
        </div>
        <div class="slider-row">
          <span class="sl">צל X</span>
          <input type="range" id="shadowX" min="-30" max="30" value="0">
          <span class="slider-val" id="shadowXVal">0</span>
        </div>
        <div class="slider-row">
          <span class="sl">צל Y</span>
          <input type="range" id="shadowY" min="-30" max="30" value="0">
          <span class="slider-val" id="shadowYVal">0</span>
        </div>
        <div class="slider-row">
          <span class="sl">טשטוש</span>
          <input type="range" id="shadowBlur" min="0" max="50" value="0">
          <span class="slider-val" id="shadowBlurVal">0</span>
        </div>
        <div class="slider-row">
          <span class="sl">צבע צל</span>
          <input type="color" id="shadowColor" value="#000000" style="width:28px;height:22px;border:none;border-radius:4px;cursor:pointer;background:transparent;">
        </div>
        <div class="slider-row">
          <span class="sl">שקיפות</span>
          <input type="range" id="opacity" min="10" max="100" value="100">
          <span class="slider-val" id="opacityVal">100%</span>
        </div>
      </div>

      <div class="control-group">
        <label class="control-label">〰️ קישוט</label>
        <div class="style-grid" style="grid-template-columns:1fr 1fr">
          <button class="style-btn active" id="curveNone" onclick="setCurve('none')">ישר</button>
          <button class="style-btn" id="curveArc" onclick="setCurve('arc')">קשת</button>
          <button class="style-btn" id="curveWave" onclick="setCurve('wave')">גל</button>
          <button class="style-btn" id="curveCircle" onclick="setCurve('circle')">עיגול</button>
        </div>
        <div class="slider-row" id="curveStrengthRow" style="margin-top:4px;display:none">
          <span class="sl">עוצמה</span>
          <input type="range" id="curveStrength" min="-100" max="100" value="50">
          <span class="slider-val" id="curveStrengthVal">50</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ============ CONFIG ============
const FONTS = [
  // === עברית + אנגלית ===
  { name: 'Heebo', label: 'עב חופשי', css: "'Heebo'", weight: '900', he: true },

// ============ INIT ============
const canvas = document.getElementById('textCanvas');
const ctx = canvas.getContext('2d');

function init() {
  buildFontGrid();
  buildStyleGrid();
  buildColorPresets();
  bindEvents();
  render();
}

function buildFontGrid() {
  const grid = document.getElementById('fontGrid');
  let addedEnLabel = false;
  FONTS.forEach((font, i) => {
    // Add section label before first English font
    if (!font.he && !addedEnLabel) {
      addedEnLabel = true;
      const label = document.createElement('div');
      label.className = 'font-section-label';
      label.textContent = '— English —';
      label.style.gridColumn = '1 / -1';
      grid.appendChild(label);
    }
    const btn = document.createElement('button');
    btn.className = 'font-btn' + (i === 0 ? ' active' : '') + (!font.he ? ' en-only' : '');
    btn.textContent = font.label;
    btn.style.fontFamily = font.css;
    btn.style.fontWeight = font.weight;
    btn.title = font.name + (font.he ? ' (עב+EN)' : ' (EN only)');
    btn.onclick = () => {
      document.querySelectorAll('.font-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.fontIndex = i;
      render();
    };
    grid.appendChild(btn);
  });
}

function buildStyleGrid() {
  const grid = document.getElementById('styleGrid');
  STYLES.forEach(style => {
    const btn = document.createElement('button');
    btn.className = 'style-btn' + (style.id === 'solid' ? ' active' : '');
    btn.textContent = style.label;
    btn.onclick = () => {
      document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.styleId = style.id;
      render();
    };
    grid.appendChild(btn);
  });
}

function buildColorPresets() {
  const container = document.getElementById('colorPresets');
  COLOR_PRESETS.forEach(preset => {
    const btn = document.createElement('button');
    btn.className = 'color-preset';
    btn.style.background = `linear-gradient(135deg, ${preset.main} 50%, ${preset.secondary} 50%)`;
    btn.title = preset.label;
    btn.onclick = () => {
      state.colorMain = preset.main;
      state.colorSecondary = preset.secondary;
      document.getElementById('colorMain').value = preset.main;
      document.getElementById('colorSecondary').value = preset.secondary;
      render();
    };
    container.appendChild(btn);
  });
}

// ============ COLOR MODE & CURVE ============
function setColorMode(mode) {
  state.colorMode = mode;
  document.querySelectorAll('#colorModeNormal,#colorModeRainbow,#colorModeRandom,#colorModeWave').forEach(b => b.classList.remove('active'));
  document.getElementById('colorMode' + mode.charAt(0).toUpperCase() + mode.slice(1)).classList.add('active');
  render();
}

function setCurve(curve) {
  state.curve = curve;
  document.querySelectorAll('#curveNone,#curveArc,#curveWave,#curveCircle').forEach(b => b.classList.remove('active'));
  document.getElementById('curve' + curve.charAt(0).toUpperCase() + curve.slice(1)).classList.add('active');
  document.getElementById('curveStrengthRow').style.display = curve === 'none' ? 'none' : 'flex';
  render();
}

function getCharColor(charIndex, totalChars) {
  if (state.colorMode === 'normal') return null;
  const t = totalChars > 1 ? charIndex / (totalChars - 1) : 0;
  if (state.colorMode === 'rainbow') {
    const hue = (t * 360) % 360;
    return `hsl(${hue}, 100%, 55%)`;
  }
  if (state.colorMode === 'random') {
    // Deterministic random based on index
    const h = (charIndex * 137.508) % 360;
    return `hsl(${h}, 85%, 55%)`;
  }
  if (state.colorMode === 'wave') {
    // Blend between main and secondary
    const blend = (Math.sin(t * Math.PI * 2) + 1) / 2;
    return blendColors(state.colorMain, state.colorSecondary, blend);
  }
  return null;
}

function blendColors(hex1, hex2, t) {
  const r1 = parseInt(hex1.slice(1,3),16), g1 = parseInt(hex1.slice(3,5),16), b1 = parseInt(hex1.slice(5,7),16);
  const r2 = parseInt(hex2.slice(1,3),16), g2 = parseInt(hex2.slice(3,5),16), b2 = parseInt(hex2.slice(5,7),16);
  const r = Math.round(r1 + (r2-r1)*t), g = Math.round(g1 + (g2-g1)*t), b = Math.round(b1 + (b2-b1)*t);
  return `rgb(${r},${g},${b})`;
}

// ============ RENDER ============
function render() {
  const font = FONTS[state.fontIndex];
  const lines = state.text.split('\n').filter(l => l.length > 0);
  if (lines.length === 0) {
    canvas.width = 1;
    canvas.height = 1;
    ctx.clearRect(0, 0, 1, 1);
    return;
  }

  const size = state.fontSize;
  const fontStr = `${font.weight} ${size}px ${font.css}, 'Heebo', sans-serif`;

  ctx.font = fontStr;
  const lineHeight = size * (state.lineSpacing / 100);

  // Measure with letter spacing
  let maxWidth = 0;
  lines.forEach(line => {
    const w = measureWithSpacing(ctx, line, state.letterSpacing);
    if (w > maxWidth) maxWidth = w;
  });

  // Apply scale
  const sx = state.scaleX / 100;
  const sy = state.scaleY / 100;

  const pad = Math.max(size * 0.8, 60);
  const totalHeight = lineHeight * lines.length;

  const cw = Math.ceil((maxWidth * sx) + pad * 2);
  const ch = Math.ceil((totalHeight * sy) + pad * 2);

  // Handle rotation + skew bounding box
  const angle = state.rotation * Math.PI / 180;
  const skew = state.skewX * Math.PI / 180;
  const cos = Math.abs(Math.cos(angle));
  const sin = Math.abs(Math.sin(angle));
  const skewExtra = Math.abs(Math.tan(skew)) * ch;
  const rw = Math.ceil(cw * cos + ch * sin + skewExtra);
  const rh = Math.ceil(cw * sin + ch * cos);

  canvas.width = rw;
  canvas.height = rh;

  ctx.clearRect(0, 0, rw, rh);
  ctx.save();
  ctx.globalAlpha = state.opacity / 100;

  // Center, rotate, scale, skew
  ctx.translate(rw / 2, rh / 2);
  ctx.rotate(angle);
  ctx.transform(sx, 0, Math.tan(skew), sy, 0, 0);

  ctx.font = fontStr;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.direction = 'rtl';

  // Custom shadow from effects panel
  if (state.shadowBlur > 0 || state.shadowX !== 0 || state.shadowY !== 0) {
    ctx.shadowColor = state.shadowColor;
    ctx.shadowBlur = state.shadowBlur;
    ctx.shadowOffsetX = state.shadowX;
    ctx.shadowOffsetY = state.shadowY;
  }

  const startY = -(totalHeight / 2) + (lineHeight / 2);

  if (state.curve !== 'none') {
    // Draw with curve
    lines.forEach((line, i) => {
      const y = startY + i * lineHeight;
      drawCurvedLine(ctx, line, 0, y, size, font);
    });
  } else if (state.colorMode !== 'normal' || state.letterSpacing !== 0) {
    // Draw char by char
    lines.forEach((line, i) => {
      const y = startY + i * lineHeight;
      drawCharByChar(ctx, line, 0, y, size, font, i);
    });
  } else {
    lines.forEach((line, i) => {
      const y = startY + i * lineHeight;
      drawStyledText(ctx, line, 0, y, size, font);
      if (state.outlineWidth > 0) {
        ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
        ctx.strokeStyle = state.outlineColor;
        ctx.lineWidth = state.outlineWidth;
        ctx.lineJoin = 'round';
        ctx.strokeText(line, 0, y);
      }
    });
  }

  ctx.restore();
}

function measureWithSpacing(ctx, text, spacing) {
  if (spacing === 0) return ctx.measureText(text).width;
  let total = 0;
  for (const ch of text) {
    total += ctx.measureText(ch).width + spacing;
  }
  return total - spacing;
}

function drawCharByChar(ctx, text, cx, cy, size, font, lineIndex) {
  const chars = [...text];
  const totalChars = chars.length;
  const spacing = state.letterSpacing;

  // Measure total width
  let totalWidth = 0;
  const widths = [];
  chars.forEach(ch => {
    const w = ctx.measureText(ch).width;
    widths.push(w);
    totalWidth += w + spacing;
  });
  totalWidth -= spacing;

  // RTL: start from the right
  let x = cx + totalWidth / 2;

  let globalCharIndex = 0;
  chars.forEach((ch, i) => {
    x -= widths[i] / 2;
    const charColor = getCharColor(globalCharIndex, totalChars);

    // Save original style state
    const origColor = state.colorMain;
    if (charColor) state.colorMain = charColor;

    drawStyledText(ctx, ch, x, cy, size, font);
    if (state.outlineWidth > 0) {
      const sv = { sb: ctx.shadowBlur, sx: ctx.shadowOffsetX, sy: ctx.shadowOffsetY };
      ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
      ctx.strokeStyle = state.outlineColor;
      ctx.lineWidth = state.outlineWidth;
      ctx.lineJoin = 'round';
      ctx.strokeText(ch, x, cy);
      ctx.shadowBlur = sv.sb; ctx.shadowOffsetX = sv.sx; ctx.shadowOffsetY = sv.sy;
    }

    state.colorMain = origColor;
    x -= widths[i] / 2 + spacing;
    globalCharIndex++;
  });
}

function drawCurvedLine(ctx, text, cx, cy, size, font) {
  const chars = [...text];
  const totalChars = chars.length;
  const spacing = state.letterSpacing;
  const strength = state.curveStrength;

  const widths = [];
  let totalWidth = 0;
  chars.forEach(ch => {
    const w = ctx.measureText(ch).width;
    widths.push(w);
    totalWidth += w + spacing;
  });
  totalWidth -= spacing;

  // RTL
  let startX = cx + totalWidth / 2;

  chars.forEach((ch, i) => {
    const t = totalChars > 1 ? i / (totalChars - 1) : 0.5;
    let yOffset = 0;

    if (state.curve === 'arc') {
      yOffset = -strength * Math.sin(t * Math.PI);
    } else if (state.curve === 'wave') {
      yOffset = strength * 0.5 * Math.sin(t * Math.PI * 3);
    } else if (state.curve === 'circle') {
      const angle = (t - 0.5) * Math.PI * (strength / 50);
      const radius = totalWidth / (Math.abs(strength / 50) * Math.PI || 1);
      yOffset = -Math.cos(angle) * radius + radius;
      // Also rotate each char
      ctx.save();
      ctx.translate(startX - widths[i] / 2, cy + yOffset);
      ctx.rotate(-angle);
      const charColor = getCharColor(i, totalChars);
      const origColor = state.colorMain;
      if (charColor) state.colorMain = charColor;
      drawStyledText(ctx, ch, 0, 0, size, font);
      state.colorMain = origColor;
      ctx.restore();
      startX -= widths[i] + spacing;
      return;
    }

    const charColor = getCharColor(i, totalChars);
    const origColor = state.colorMain;
    if (charColor) state.colorMain = charColor;

    startX -= widths[i] / 2;
    drawStyledText(ctx, ch, startX, cy + yOffset, size, font);
    if (state.outlineWidth > 0) {
      ctx.strokeStyle = state.outlineColor;
      ctx.lineWidth = state.outlineWidth;
      ctx.lineJoin = 'round';
      ctx.strokeText(ch, startX, cy + yOffset);
    }
    state.colorMain = origColor;
    startX -= widths[i] / 2 + spacing;
  });
}

function drawStyledText(ctx, text, x, y, size, font) {
  const style = state.styleId;
  const c1 = state.colorMain;
  const c2 = state.colorSecondary;

  switch (style) {
    case 'solid':
      ctx.fillStyle = c1;
      ctx.fillText(text, x, y);
      break;

    case 'outline':
      ctx.strokeStyle = c1;
      ctx.lineWidth = Math.max(2, size * 0.04);
      ctx.lineJoin = 'round';
      ctx.strokeText(text, x, y);
      break;

    case 'neon': {
      // Glow layers
      const glowColor = c1;
      for (let i = 5; i >= 1; i--) {
        ctx.shadowColor = glowColor;
        ctx.shadowBlur = size * 0.08 * i;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 0;
        ctx.fillStyle = i === 1 ? '#ffffff' : glowColor;
        ctx.fillText(text, x, y);
      }
      ctx.shadowBlur = 0;
      // White core
      ctx.fillStyle = '#ffffff';
      ctx.fillText(text, x, y);
      break;
    }

    case 'shadow3d': {
      const depth = Math.max(4, Math.floor(size * 0.06));
      // 3D shadow layers
      for (let i = depth; i > 0; i--) {
        const shade = Math.floor(40 + (i / depth) * 60);
        ctx.fillStyle = darkenColor(c2, shade / 100);
        ctx.fillText(text, x + i * 1.5, y + i * 1.5);
      }
      ctx.fillStyle = c1;
      ctx.fillText(text, x, y);
      break;
    }

    case 'gradient': {
      const grad = ctx.createLinearGradient(x - size * 2, y - size / 2, x + size * 2, y + size / 2);
      grad.addColorStop(0, c1);
      grad.addColorStop(0.5, c2);
      grad.addColorStop(1, c1);
      ctx.fillStyle = grad;
      ctx.fillText(text, x, y);
      break;
    }

    case 'chrome': {
      const grad = ctx.createLinearGradient(x, y - size * 0.5, x, y + size * 0.5);
      grad.addColorStop(0, '#e8e8e8');
      grad.addColorStop(0.3, '#ffffff');
      grad.addColorStop(0.5, '#8c8c8c');
      grad.addColorStop(0.7, '#ffffff');
      grad.addColorStop(1, '#a0a0a0');
      // Dark outline
      ctx.strokeStyle = '#333';
      ctx.lineWidth = Math.max(2, size * 0.03);
      ctx.lineJoin = 'round';
      ctx.strokeText(text, x, y);
      ctx.fillStyle = grad;
      ctx.fillText(text, x, y);
      break;
    }

    case 'fire': {
      // Fire glow
      ctx.shadowColor = '#ff4500';
      ctx.shadowBlur = size * 0.15;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = -size * 0.03;

      const grad = ctx.createLinearGradient(x, y + size * 0.4, x, y - size * 0.5);
      grad.addColorStop(0, '#ff0000');
      grad.addColorStop(0.4, '#ff6600');
      grad.addColorStop(0.7, '#ffcc00');
      grad.addColorStop(1, '#ffff66');
      ctx.fillStyle = grad;
      ctx.fillText(text, x, y);
      ctx.shadowBlur = 0;
      break;
    }

    case 'gold': {
      // Gold outline
      ctx.strokeStyle = '#8B6914';
      ctx.lineWidth = Math.max(3, size * 0.04);
      ctx.lineJoin = 'round';
      ctx.strokeText(text, x, y);
      // Gold gradient
      const grad = ctx.createLinearGradient(x, y - size * 0.5, x, y + size * 0.5);
      grad.addColorStop(0, '#ffd700');
      grad.addColorStop(0.25, '#fff8dc');
      grad.addColorStop(0.5, '#daa520');
      grad.addColorStop(0.75, '#fff8dc');
      grad.addColorStop(1, '#b8860b');
      ctx.fillStyle = grad;
      ctx.fillText(text, x, y);
      // Shine
      ctx.shadowColor = '#ffd700';
      ctx.shadowBlur = size * 0.08;
      ctx.fillText(text, x, y);
      ctx.shadowBlur = 0;
      break;
    }

    case 'ice': {
      ctx.shadowColor = '#00ccff';
      ctx.shadowBlur = size * 0.12;
      const grad = ctx.createLinearGradient(x, y - size * 0.5, x, y + size * 0.5);
      grad.addColorStop(0, '#ffffff');
      grad.addColorStop(0.3, '#b3e5fc');
      grad.addColorStop(0.6, '#4fc3f7');
      grad.addColorStop(1, '#0288d1');
      ctx.strokeStyle = '#006090';
      ctx.lineWidth = Math.max(2, size * 0.025);
      ctx.lineJoin = 'round';
      ctx.strokeText(text, x, y);
      ctx.fillStyle = grad;
      ctx.fillText(text, x, y);
      ctx.shadowBlur = 0;
      break;
    }

    case 'retro': {
      // Retro shadow
      const offset = Math.max(3, size * 0.04);
      ctx.fillStyle = c2;
      ctx.fillText(text, x + offset, y + offset);
      // Main
      ctx.strokeStyle = c2;
      ctx.lineWidth = Math.max(3, size * 0.04);
      ctx.lineJoin = 'round';
      ctx.strokeText(text, x, y);
      ctx.fillStyle = c1;
      ctx.fillText(text, x, y);
      break;
    }

    case 'stamp': {
      // Thick outline stamp look
      ctx.strokeStyle = c1;
      ctx.lineWidth = Math.max(4, size * 0.06);
      ctx.lineJoin = 'round';
      ctx.strokeText(text, x, y);
      // Inner transparent (draw with bg to punch out)
      ctx.globalCompositeOperation = 'destination-out';
      ctx.fillStyle = '#000';
      ctx.fillText(text, x, y);
      ctx.globalCompositeOperation = 'source-over';
      // Re-draw thin inner line
      ctx.strokeStyle = c1;
      ctx.lineWidth = Math.max(1, size * 0.015);
      ctx.strokeText(text, x, y);
      break;
    }

    case 'double': {
      // Back layer
      const off = Math.max(3, size * 0.035);
      ctx.fillStyle = c2;
      ctx.fillText(text, x + off, y + off);
      // Front layer
      ctx.fillStyle = c1;
      ctx.fillText(text, x, y);
      break;
    }
  }
}

function darkenColor(hex, factor) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgb(${Math.floor(r * factor)}, ${Math.floor(g * factor)}, ${Math.floor(b * factor)})`;
}

// ============ EXPORT ============
function downloadPNG() {
  // Render at 2x for print quality
  const origSize = state.fontSize;
  const origSpacing = state.letterSpacing;
  const origOutline = state.outlineWidth;
  const origShadowX = state.shadowX;
  const origShadowY = state.shadowY;
  const origShadowBlur = state.shadowBlur;

  state.fontSize = origSize * 2;
  state.letterSpacing = origSpacing * 2;
  state.outlineWidth = origOutline * 2;
  state.shadowX = origShadowX * 2;
  state.shadowY = origShadowY * 2;
  state.shadowBlur = origShadowBlur * 2;

  render();

  const link = document.createElement('a');
  link.download = 'moty_text_' + Date.now() + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();

  // Restore
  state.fontSize = origSize;
  state.letterSpacing = origSpacing;
  state.outlineWidth = origOutline;
  state.shadowX = origShadowX;
  state.shadowY = origShadowY;
  state.shadowBlur = origShadowBlur;
  render();
}

async function copyToClipboard() {
  try {
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
    await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ הועתק!';
    setTimeout(() => btn.textContent = '📋 העתק', 2000);
  } catch (e) {
    // Fallback: download
    downloadPNG();
  }
}

// Wait for fonts to load
document.fonts.ready.then(() => {
  init();
});
