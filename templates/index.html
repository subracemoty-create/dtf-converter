<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTF Converter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            padding: 30px 20px 15px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-bottom: 2px solid #333;
        }

        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #e74c3c, #f39c12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .header p {
            color: #888;
            font-size: 1em;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Controls */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
            padding: 18px 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-group label {
            font-size: 0.95em;
            color: #aaa;
            font-weight: 600;
        }

        .btn-group {
            display: flex;
            gap: 4px;
        }

        .btn-group button {
            padding: 8px 16px;
            border: 2px solid #444;
            background: #222;
            color: #ccc;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
        }

        .btn-group button.active {
            border-color: #e74c3c;
            background: #e74c3c;
            color: #fff;
        }

        .btn-group button:hover:not(.active) {
            border-color: #666;
            background: #333;
        }

        input[type="range"] {
            width: 120px;
            accent-color: #e74c3c;
        }

        .range-val {
            color: #e74c3c;
            font-weight: bold;
            min-width: 30px;
            text-align: center;
        }

        /* Drop Zone */
        .drop-zone {
            border: 3px dashed #444;
            border-radius: 16px;
            padding: 50px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #111;
            margin-bottom: 20px;
        }

        .drop-zone:hover, .drop-zone.drag-over {
            border-color: #e74c3c;
            background: #1a1111;
        }

        .drop-zone .icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .drop-zone p {
            color: #888;
            font-size: 1.1em;
        }

        .drop-zone .browse {
            color: #e74c3c;
            text-decoration: underline;
            cursor: pointer;
        }

        /* Previews */
        .previews {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .previews { grid-template-columns: 1fr; }
            .controls { flex-direction: column; }
        }

        .preview-box {
            background: #1a1a1a;
            border-radius: 12px;
            border: 1px solid #333;
            overflow: hidden;
        }

        .preview-box .title {
            padding: 10px 15px;
            font-weight: 700;
            font-size: 0.85em;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #333;
            text-align: center;
        }

        .preview-box .img-container {
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 350px;
            background: #111;
        }

        .preview-box img {
            max-width: 100%;
            max-height: 450px;
            border-radius: 4px;
        }

        /* Preview mode toggle */
        .preview-toggle {
            display: flex;
            gap: 4px;
            justify-content: center;
            padding: 8px;
            border-top: 1px solid #333;
        }

        .preview-toggle button {
            padding: 5px 12px;
            border: 1px solid #444;
            background: #222;
            color: #aaa;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8em;
            transition: all 0.2s;
        }

        .preview-toggle button.active {
            border-color: #e74c3c;
            color: #fff;
            background: #333;
        }

        /* Buttons */
        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .btn {
            padding: 14px 35px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-convert {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: #fff;
        }

        .btn-convert:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(46, 204, 113, 0.3);
        }

        .btn-download {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: #fff;
        }

        .btn-download:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(155, 89, 182, 0.3);
        }

        /* Progress */
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 15px;
            display: none;
        }

        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #e74c3c, #f39c12);
            border-radius: 3px;
            transition: width 0.3s;
            width: 0%;
        }

        .status {
            text-align: center;
            font-size: 0.95em;
            color: #888;
            margin-bottom: 10px;
        }

        .status.success { color: #2ecc71; }
        .status.error { color: #e74c3c; }
        .status.processing { color: #f39c12; }

        /* Spinner */
        .spinner {
            display: none;
            width: 40px;
            height: 40px;
            border: 4px solid #333;
            border-top: 4px solid #e74c3c;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔥 DTF Converter</h1>
        <p>הסרת רקע אוטומטית להדפסת DTF — גרור תמונה או לחץ לבחירה</p>
    </div>

    <div class="container">
        <!-- Controls -->
        <div class="controls">
            <div class="control-group">
                <label>צבע חולצה:</label>
                <div class="btn-group" id="shirtColor">
                    <button class="active" data-value="black">⬛ שחור</button>
                    <button data-value="white">⬜ לבן</button>
                </div>
            </div>

            <div class="control-group">
                <label>עוצמה:</label>
                <input type="range" id="threshold" min="10" max="80" value="25">
                <span class="range-val" id="thresholdVal">25</span>
            </div>

            <div class="control-group">
                <label>ריכוך קצוות:</label>
                <input type="range" id="feather" min="1" max="8" value="3">
                <span class="range-val" id="featherVal">3</span>
            </div>

            <div class="control-group">
                <label>סף ניקוי:</label>
                <input type="range" id="minCluster" min="100" max="2000" value="500" step="100">
                <span class="range-val" id="minClusterVal">500</span>
            </div>
        </div>

        <!-- Halftone Controls -->
        <div class="controls" style="border: 1px solid #e74c3c44;">
            <div class="control-group">
                <label>🔵 Halftone:</label>
                <div class="btn-group" id="halftoneMode">
                    <button data-value="auto">אוטו</button>
                    <button data-value="on">פעיל</button>
                    <button class="active" data-value="off">כבוי</button>
                </div>
            </div>

            <div class="control-group">
                <label>גודל נקודה:</label>
                <input type="range" id="dotSize" min="3" max="12" value="6">
                <span class="range-val" id="dotSizeVal">6</span>
            </div>

            <div class="control-group">
                <label>זווית:</label>
                <input type="range" id="halftoneAngle" min="0" max="90" value="45" step="5">
                <span class="range-val" id="halftoneAngleVal">45°</span>
            </div>
        </div>

        <!-- Drop Zone -->
        <div class="drop-zone" id="dropZone">
            <div class="icon">📁</div>
            <p>גרור תמונה לכאן או <span class="browse">לחץ לבחירה</span></p>
            <input type="file" id="fileInput" accept="image/*" hidden>
        </div>

        <!-- Progress -->
        <div class="progress-bar" id="progressBar">
            <div class="fill" id="progressFill"></div>
        </div>

        <div class="spinner" id="spinner"></div>
        <div class="status" id="status"></div>

        <!-- Actions -->
        <div class="actions">
            <button class="btn btn-convert" id="convertBtn" disabled>🚀 המרה</button>
            <a class="btn btn-download" id="downloadBtn" style="pointer-events:none; opacity:0.4">💾 הורדה</a>
        </div>

        <!-- Previews -->
        <div class="previews">
            <div class="preview-box">
                <div class="title">📷 מקור</div>
                <div class="img-container" id="originalPreview">
                    <p style="color:#555">טרם נטענה תמונה</p>
                </div>
            </div>
            <div class="preview-box">
                <div class="title">✅ תוצאה DTF</div>
                <div class="img-container" id="resultPreview">
                    <p style="color:#555">התוצאה תופיע כאן</p>
                </div>
                <div class="preview-toggle" id="previewToggle" style="display:none">
                    <button class="active" data-mode="checker">🏁 שקוף</button>
                    <button data-mode="black">⬛ שחור</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const convertBtn = document.getElementById('convertBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const originalPreview = document.getElementById('originalPreview');
        const resultPreview = document.getElementById('resultPreview');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const spinner = document.getElementById('spinner');
        const status = document.getElementById('status');
        const previewToggle = document.getElementById('previewToggle');

        let selectedFile = null;
        let currentFileId = null;

        // Button group toggles
        ['shirtColor', 'halftoneMode'].forEach(groupId => {
            document.getElementById(groupId).addEventListener('click', e => {
                if (e.target.tagName === 'BUTTON') {
                    document.querySelectorAll(`#${groupId} button`).forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                }
            });
        });

        // Range sliders
        ['threshold', 'feather', 'minCluster', 'dotSize'].forEach(id => {
            const slider = document.getElementById(id);
            const val = document.getElementById(id + 'Val');
            slider.addEventListener('input', () => val.textContent = slider.value);
        });

        // Angle slider with degree sign
        const angleSlider = document.getElementById('halftoneAngle');
        const angleVal = document.getElementById('halftoneAngleVal');
        angleSlider.addEventListener('input', () => angleVal.textContent = angleSlider.value + '°');

        // Preview toggle
        previewToggle.addEventListener('click', e => {
            if (e.target.tagName === 'BUTTON' && currentFileId) {
                document.querySelectorAll('#previewToggle button').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                const mode = e.target.dataset.mode;
                resultPreview.innerHTML = `<img src="/preview/${currentFileId}/${mode}">`;
            }
        });

        // Drop zone
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', () => { if (fileInput.files.length) loadFile(fileInput.files[0]); });

        function loadFile(file) {
            selectedFile = file;
            convertBtn.disabled = false;
            status.textContent = `נטען: ${file.name}`;
            status.className = 'status';

            const reader = new FileReader();
            reader.onload = e => {
                originalPreview.innerHTML = `<img src="${e.target.result}">`;
            };
            reader.readAsDataURL(file);

            resultPreview.innerHTML = '<p style="color:#555">לחץ "המרה" לעיבוד</p>';
            previewToggle.style.display = 'none';
            downloadBtn.style.pointerEvents = 'none';
            downloadBtn.style.opacity = '0.4';
        }

        // Convert
        convertBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            convertBtn.disabled = true;
            progressBar.style.display = 'block';
            progressFill.style.width = '30%';
            spinner.style.display = 'block';
            status.textContent = '🔄 מעבד...';
            status.className = 'status processing';

            const formData = new FormData();
            formData.append('image', selectedFile);
            formData.append('shirt_color', document.querySelector('#shirtColor button.active').dataset.value);
            formData.append('threshold', document.getElementById('threshold').value);
            formData.append('feather', document.getElementById('feather').value);
            formData.append('min_cluster', document.getElementById('minCluster').value);
            formData.append('halftone', document.querySelector('#halftoneMode button.active').dataset.value);
            formData.append('dot_size', document.getElementById('dotSize').value);
            formData.append('halftone_angle', document.getElementById('halftoneAngle').value);

            progressFill.style.width = '60%';

            try {
                const res = await fetch('/convert', { method: 'POST', body: formData });
                const data = await res.json();

                progressFill.style.width = '100%';
                spinner.style.display = 'none';

                if (data.success) {
                    currentFileId = data.file_id;
                    resultPreview.innerHTML = `<img src="/preview/${data.file_id}/checker">`;
                    previewToggle.style.display = 'flex';

                    downloadBtn.href = `/download/${data.file_id}`;
                    downloadBtn.style.pointerEvents = 'auto';
                    downloadBtn.style.opacity = '1';
                    downloadBtn.download = data.filename;

                    const htLabel = data.halftone ? ' 🔵 Halftone' : ' ⚡ Standard';
                    status.textContent = `✅ הושלם! ${data.size} — ${data.filename}${htLabel}`;
                    status.className = 'status success';
                } else {
                    status.textContent = `❌ שגיאה: ${data.error}`;
                    status.className = 'status error';
                }
            } catch (err) {
                spinner.style.display = 'none';
                status.textContent = `❌ שגיאה: ${err.message}`;
                status.className = 'status error';
            }

            convertBtn.disabled = false;
            setTimeout(() => { progressBar.style.display = 'none'; }, 1000);
        });
    </script>
</body>
</html>
